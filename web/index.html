<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Primary Meta Tags -->
    <title>Galant - L'Élégance à chaque rencontre</title>
    <meta name="description" content="La première plateforme de rencontre premium en Afrique Centrale.">
    <meta name="theme-color" content="#ef4444">

    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Galant">
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
  </head>
  <body class="text-slate-900 overflow-x-hidden">
    <div id="debug-error" style="display:none; color:white; background:red; padding:10px; position:fixed; top:0; left:0; right:0; z-index:9999; font-family:monospace; font-size:12px; white-space:pre-wrap; max-height: 50vh; overflow: auto;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.getElementById('debug-error');
        div.style.display = 'block';
        div.textContent = 'Global Error: ' + msg + '\nFile: ' + url + '\nLine: ' + line + ':' + col + (error ? '\nStack: ' + error.stack : '');
      };
      window.onunhandledrejection = function(event) {
        var div = document.getElementById('debug-error');
        div.style.display = 'block';
        div.textContent = 'Unhandled Rejection: ' + event.reason;
      };
    </script>

    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background-color: #0f172a; color: white;">
        <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #ef4444; border-radius: 50%; animation: galant-spin 1s linear infinite; margin-bottom: 20px;"></div>
        <style>@keyframes galant-spin { to { transform: rotate(360deg); } }</style>
        <div style="font-weight: 900; letter-spacing: -0.05em; font-size: 24px; font-style: italic;">GALANT</div>
        <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.5; margin-top: 10px;">L'élégance patiente...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
