name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Quality tests
        run: npm run test:quality

      - name: Validate server syntax
        run: npm --prefix server run check:syntax

      - name: Validate setup scripts syntax (optional)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "scripts/setup-test-users.mjs" ]]; then
            node --check scripts/setup-test-users.mjs
          else
            echo "scripts/setup-test-users.mjs not found; skipping syntax check."
          fi
