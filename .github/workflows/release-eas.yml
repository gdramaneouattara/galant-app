name: Release EAS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - preview
          - production
          - production-simulated
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios
      submit:
        description: "Auto-submit to stores (production only)"
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.EXPO_TOKEN }}" ]]; then
            echo "::error::Missing required secret EXPO_TOKEN."
            exit 1
          fi

      - name: Validate submit/profile combination
        if: ${{ inputs.submit == true }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.profile }}" != "production" ]]; then
            echo "::error::Auto-submit is allowed only with profile=production."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck before release
        run: npm run typecheck

      - name: Setup EAS CLI
        run: npm install --global eas-cli@latest

      - name: EAS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_TERMS_URL: ${{ secrets.EXPO_PUBLIC_TERMS_URL }}
          EXPO_PUBLIC_PRIVACY_URL: ${{ secrets.EXPO_PUBLIC_PRIVACY_URL }}
          EXPO_PUBLIC_SIMULATE_PAYMENT: ${{ secrets.EXPO_PUBLIC_SIMULATE_PAYMENT }}
        shell: bash
        run: |
          set -euo pipefail

          AUTO_SUBMIT_FLAG=""
          if [[ "${{ inputs.submit }}" == "true" ]]; then
            AUTO_SUBMIT_FLAG="--auto-submit"
          fi

          eas build \
            --non-interactive \
            --wait \
            --platform "${{ inputs.platform }}" \
            --profile "${{ inputs.profile }}" \
            ${AUTO_SUBMIT_FLAG}
